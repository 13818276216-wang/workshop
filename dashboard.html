<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>袋鼠先生 · 线下经销商销售看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
.header { max-width: 1200px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.header h1 span { color: #e85d04; }
.header .sub { font-size: 13px; color: #888; }
.cards { max-width: 1200px; margin: 0 auto 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
/* ===== 总览卡片 ===== */
.overview-row { max-width: 1200px; margin: 0 auto 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.overview-card { border-radius: 12px; padding: 22px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #fff; }
.overview-card .oc-label { font-size: 13px; opacity: 0.85; margin-bottom: 12px; font-weight: 500; }
.overview-card .oc-metrics { display: flex; flex-direction: column; gap: 6px; }
.overview-card .oc-row { display: flex; justify-content: space-between; align-items: baseline; }
.overview-card .oc-row .oc-title { font-size: 13px; opacity: 0.75; }
.overview-card .oc-row .oc-val { font-size: 22px; font-weight: 700; }
.overview-card .oc-row .oc-val.oc-sub { font-size: 16px; font-weight: 600; opacity: 0.9; }
.oc-card-1 { background: linear-gradient(135deg, #e85d04, #f48c06); }
.oc-card-2 { background: linear-gradient(135deg, #2d6a4f, #40916c); }
.oc-card-3 { background: linear-gradient(135deg, #1a1a2e, #2d2d44); }

/* ===== 原卡片（后续模块用） ===== */
.card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; }
.card .value.gold { color: #e85d04; }
.card .sub-text { font-size: 12px; color: #999; margin-top: 2px; }
.charts-row { max-width: 1200px; margin: 0 auto 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.chart-box { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.chart-box h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; }
.chart-box .chart-wrap { position: relative; height: 200px; }
.tables-row { max-width: 1200px; margin: 0 auto 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.table-box { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.table-box h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; }
.table-box h3 .count { font-weight: 400; color: #999; font-size: 12px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: #f8f9fb; color: #666; font-weight: 600; padding: 8px 6px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; }
tbody td { padding: 7px 6px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
tbody tr:hover { background: #fafbfc; }
.rank { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
.rank-1 { background: #e85d04; }
.rank-2 { background: #f48c06; }
.rank-3 { background: #faa307; }
.rank-other { background: #ddd; color: #666; }
.num { font-family: 'SF Mono', 'Consolas', monospace; text-align: right; }
.pct-up { color: #2d6a4f; }
.pct-down { color: #d00000; }
.pct-neutral { color: #999; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.dot-green { background: #52b788; }
.dot-yellow { background: #ffb703; }
.dot-red { background: #e63946; }
.footer { max-width: 1200px; margin: 0 auto; text-align: center; font-size: 11px; color: #bbb; padding: 20px 0; }
/* ===== 选项卡 ===== */
.tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tab-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #666; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { border-color: #e85d04; color: #e85d04; }
.tab-btn.active { background: #e85d04; border-color: #e85d04; color: #fff; }
.subtotal-row { font-weight: 600; background: #fff9f5; }
.subtotal-row td { border-top: 2px solid #e85d04; }
@media (max-width: 768px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .charts-row, .tables-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🦘 袋鼠先生 · <span>线下经销商销售看板</span></h1>
    <div class="sub">数据范围：2026年4月 ~ 6月 · 已剔除鸣鸣很忙体系</div>
  </div>
  <div class="sub" id="updateTime">加载中...</div>
</div>

<div class="overview-row" id="overview"></div>

<div class="tables-row" id="provinceSection">
  <div class="table-box" style="grid-column: 1 / -1;">
    <h3>🏢 分省区经营 <span class="count" id="provinceCount"></span></h3>
    <div class="table-wrap"><table><thead><tr>
      <th>#</th><th>省区经理</th><th class="num">客户数</th><th class="num">今日新增订单金额(万元)</th><th class="num">本月累计销售金额(万元)</th><th class="num">本年累计销售金额(万元)</th><th class="num">本年累计毛利额(万元)</th><th class="num">本年累计毛利率</th>
    </tr></thead><tbody id="provinceTable"></tbody></table></div>
  </div>
</div>

<div class="tables-row">
  <div class="table-box" style="grid-column: 1 / -1;">
    <h3>🏪 分经销商明细 <span class="count" id="dealerCount"></span></h3>
    <div class="tab-bar" id="dealerTabs"></div>
    <div class="table-wrap"><table><thead><tr>
      <th>#</th><th>经销商</th><th class="num">今日订单额(万元)</th><th class="num">本月订单额(万元)</th><th class="num">累计订单额(万元)</th><th class="num">累计毛利率</th><th>首批订单月</th><th>省区经理</th>
    </tr></thead><tbody id="dealerTable"></tbody></table></div>
  </div>
</div>

<div class="tables-row">
  <div class="table-box" style="grid-column: 1 / -1;">
    <h3>📦 产品 Top 10 <span class="count" id="productCount"></span></h3>
    <div class="table-wrap"><table><thead><tr>
      <th>#</th><th>产品</th><th class="num">销量</th><th class="num">均价</th><th class="num">销售额(万元)</th><th class="num">毛利率</th>
    </tr></thead><tbody id="productTable"></tbody></table></div>
  </div>
</div>

<div class="footer">袋鼠先生线下渠道 · 每日自动更新</div>

<script>
function fmt(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toLocaleString();
}
function fmtMoney(n) {
  if (Math.abs(n) >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString();
}
function fmtW(n) {
  // 万元数值，不写"万"字
  return (n / 10000).toFixed(2);
}
function pctClass(v) {
  if (v >= 20) return 'pct-up';
  if (v >= 0) return 'pct-neutral';
  return 'pct-down';
}
function rankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-other';
}

fetch('dashboard_data.json').then(r => r.json()).then(d => {
  document.getElementById('updateTime').textContent = '更新于 ' + d.update_time;

  // ===== 总览卡片（三色块） =====
  document.getElementById('overview').innerHTML = `
    <div class="overview-card oc-card-1">
      <div class="oc-label">📊 累计</div>
      <div class="oc-metrics">
        <div class="oc-row"><span class="oc-title">销售金额</span><span class="oc-val">${fmt(d.total_sales)}</span></div>
        <div class="oc-row"><span class="oc-title">毛利</span><span class="oc-val">${fmt(d.total_profit)}</span></div>
        <div class="oc-row"><span class="oc-title">毛利率</span><span class="oc-val">${d.total_profit_rate}%</span></div>
      </div>
    </div>
    <div class="overview-card oc-card-2">
      <div class="oc-label">📅 本月（${d.current_month}）</div>
      <div class="oc-metrics">
        <div class="oc-row"><span class="oc-title">销售金额</span><span class="oc-val">${fmt(d.month_sales)}</span></div>
        <div class="oc-row"><span class="oc-title">毛利</span><span class="oc-val">${fmt(d.month_profit)}</span></div>
        <div class="oc-row"><span class="oc-title">毛利率</span><span class="oc-val">${d.month_profit_rate}%</span></div>
      </div>
    </div>
    <div class="overview-card oc-card-3">
      <div class="oc-label">📌 今日（${d.today_key ? d.today_key.substring(5) : '-'}）</div>
      <div class="oc-metrics">
        <div class="oc-row"><span class="oc-title">新增订单金额</span><span class="oc-val">${fmt(d.today_sales)}</span></div>
        <div class="oc-row"><span class="oc-title">订单数</span><span class="oc-val oc-sub">${d.today_orders} 笔</span></div>
      </div>
    </div>
  `;

  document.getElementById('dealerCount').textContent = `· 共 ${d.total_dealers} 家`;
  document.getElementById('provinceCount').textContent = `· 共 ${d.managers.length} 人`;
  document.getElementById('productCount').textContent = `· 共 ${d.products.length} 个`;

  // ===== 分经销商明细选项卡 =====
  let currentDealerTab = '全部';
  const managerNames = d.managers.map(m => m.name);

  function renderDealerTabs() {
    const tabs = ['全部', ...managerNames];
    document.getElementById('dealerTabs').innerHTML = tabs.map(t =>
      `<button class="tab-btn${t === currentDealerTab ? ' active' : ''}" onclick="switchDealerTab('${t}')">${t}</button>`
    ).join('');
  }

  function renderDealerTable() {
    let filtered;
    if (currentDealerTab === '全部') {
      filtered = d.dealers;
    } else {
      filtered = d.dealers.filter(v => v.manager === currentDealerTab);
    }
    const rows = filtered.map((v, i) => {
      const pr = v.profit_rate;
      return `<tr>
        <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
        <td>${v.name}</td>
        <td class="num">${fmtW(v.today_sales)}</td>
        <td class="num">${fmtW(v.month_sales)}</td>
        <td class="num">${fmtW(v.sales)}</td>
        <td class="num ${pctClass(pr)}">${pr}%</td>
        <td>${v.first_month || '-'}</td>
        <td>${v.manager || '-'}</td>
      </tr>`;
    });
    // 小计行
    if (filtered.length > 0) {
      const st = filtered.reduce((s, v) => s + v.today_sales, 0);
      const sm = filtered.reduce((s, v) => s + v.month_sales, 0);
      const sy = filtered.reduce((s, v) => s + v.sales, 0);
      const sp = filtered.reduce((s, v) => s + v.profit, 0);
      const sr = sy > 0 ? (sp / sy * 100).toFixed(1) : 0;
      rows.push(`<tr class="subtotal-row">
        <td></td><td>${currentDealerTab} 小计（${filtered.length}家）</td>
        <td class="num">${fmtW(st)}</td>
        <td class="num">${fmtW(sm)}</td>
        <td class="num">${fmtW(sy)}</td>
        <td class="num ${pctClass(parseFloat(sr))}">${sr}%</td>
        <td></td><td></td>
      </tr>`);
    }
    document.getElementById('dealerTable').innerHTML = rows.join('');
  }

  window.switchDealerTab = function(tab) {
    currentDealerTab = tab;
    renderDealerTabs();
    renderDealerTable();
  };

  renderDealerTabs();
  renderDealerTable();

  // 分经销商明细表（全量，按累计订单额降序）
  document.getElementById('dealerTable').innerHTML = d.dealers.map((v, i) => {
    const pr = v.profit_rate;
    return `<tr>
      <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
      <td>${v.name}</td>
      <td class="num">${fmtW(v.today_sales)}</td>
      <td class="num">${fmtW(v.month_sales)}</td>
      <td class="num">${fmtW(v.sales)}</td>
      <td class="num ${pctClass(pr)}">${pr}%</td>
      <td>${v.first_month || '-'}</td>
      <td>${v.manager || '-'}</td>
    </tr>`;
  }).join('');

  // 分省区经营表（含总计行）
  const manRows = d.managers.map((v, i) => {
    return `<tr>
      <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
      <td><strong>${v.name}</strong></td>
      <td class="num">${v.clients} 家</td>
      <td class="num">${fmtW(v.today_sales)}</td>
      <td class="num">${fmtW(v.month_sales)}</td>
      <td class="num">${fmtW(v.sales)}</td>
      <td class="num">${fmtW(v.profit)}</td>
      <td class="num ${pctClass(v.profit_rate)}">${v.profit_rate}%</td>
    </tr>`;
  }).join('');
  // 总计
  const totalToday = d.managers.reduce((s, v) => s + v.today_sales, 0);
  const totalMonth = d.managers.reduce((s, v) => s + v.month_sales, 0);
  const totalYear = d.managers.reduce((s, v) => s + v.sales, 0);
  const totalProfit = d.managers.reduce((s, v) => s + v.profit, 0);
  const totalRate = totalYear > 0 ? (totalProfit / totalYear * 100).toFixed(1) : 0;
  const totalClients = d.managers.reduce((s, v) => s + v.clients, 0);
  const totalRow = `<tr style="font-weight:700;background:#f8f9fb;">
    <td></td><td>合计</td>
    <td class="num">${totalClients} 家</td>
    <td class="num">${fmtW(totalToday)}</td>
    <td class="num">${fmtW(totalMonth)}</td>
    <td class="num">${fmtW(totalYear)}</td>
    <td class="num">${fmtW(totalProfit)}</td>
    <td class="num ${pctClass(totalRate)}">${totalRate}%</td>
  </tr>`;
  document.getElementById('provinceTable').innerHTML = manRows + totalRow;

  // 产品表
  document.getElementById('productTable').innerHTML = d.products.slice(0, 10).map((v, i) => {
    const pr = v.profit_rate;
    return `<tr>
      <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
      <td>${v.name}</td>
      <td class="num">${v.qty.toLocaleString()}</td>
      <td class="num">¥${v.avg_price}</td>
      <td class="num">${fmtW(v.sales)}</td>
      <td class="num ${pctClass(pr)}">${pr}%</td>
    </tr>`;
  }).join('');

});
</script>
</body>
</html>

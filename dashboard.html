<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>袋鼠先生·线下渠道综合看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
.header { max-width: 900px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
.header h1 span { color: #e85d04; }
.header .sub { font-size: 13px; color: #888; }
/* ===== 主选项卡 ===== */
.main-tabs { max-width: 900px; margin: 0 auto 16px; display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
.main-tab-btn { flex: 1; padding: 10px 0; border: none; background: #fff; color: #666; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.main-tab-btn:first-child { border-right: 1px solid #e0e0e0; }
.main-tab-btn:hover { background: #fef5f0; color: #e85d04; }
.main-tab-btn.active { background: #e85d04; color: #fff; }
/* 总览表格（与下方表格风格一致） */
.overview-section { max-width: 900px; margin: 0 auto 8px; background: #fff; border-radius: 12px; padding: 14px 18px 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; }
.overview-section .section-label { font-size: 13px; color: #333; font-weight: 600; margin-bottom: 8px; }
.overview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.overview-table th { background: #f8f9fb; color: #666; font-weight: 600; padding: 6px 8px; text-align: right; border-bottom: 1px solid #eee; white-space: nowrap; }
.overview-table th:first-child { text-align: left; }
.overview-table td { padding: 6px 8px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
.overview-table td:first-child { font-weight: 600; color: #333; }
.overview-table td:nth-child(2) { font-weight: 600; }
.overview-table .num { text-align: right; font-family: inherit; }
.overview-table tr:last-child td { border-bottom: none; }
.overview-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.od-1 { background: #e85d04; }
.od-2 { background: #2d6a4f; }
.od-3 { background: #3a0ca3; }
.od-4 { background: #1a1a2e; }
/* 模块标题 */
.section-title { max-width: 900px; margin: 0 auto 8px; font-size: 16px; font-weight: 700; color: #1a1a2e; padding: 10px 0 6px 16px; position: relative; }
.section-title::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 0; height: 2px; background: #e85d04; }
.sub-title { max-width: 900px; margin: 0 auto 8px; font-size: 14px; font-weight: 600; color: #333; padding: 8px 0 4px 16px; }

/* ===== 原卡片（后续模块用） ===== */
.card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; }
.card .value.gold { color: #e85d04; }
.card .sub-text { font-size: 12px; color: #999; margin-top: 2px; }
.charts-row { max-width: 900px; margin: 0 auto 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.chart-box { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.chart-box h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; }
.chart-box .chart-wrap { position: relative; height: 200px; }
.tables-row { max-width: 900px; margin: 0 auto 20px; display: grid; grid-template-columns: 1fr; }
.table-box { background: #fff; border-radius: 12px; padding: 18px 18px 18px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.table-box h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; }
.table-box h3 .count { font-weight: 400; color: #999; font-size: 12px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: #f8f9fb; color: #666; font-weight: 600; padding: 8px 6px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; }
tbody td { padding: 7px 6px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
tbody tr:hover { background: #fafbfc; }
.rank { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
.rank-1 { background: #e85d04; }
.rank-2 { background: #f48c06; }
.rank-3 { background: #faa307; }
.rank-other { background: #ddd; color: #666; }
.num { font-family: 'SF Mono', 'Consolas', monospace; text-align: right; }
.pct-up { color: #2d6a4f; }
.pct-down { color: #d00000; }
.pct-neutral { color: #999; }
/* 环比颜色：涨红跌绿（中国习惯） */
.ratio-up { color: #d00000; font-weight: 600; }
.ratio-flat { color: #666; }
.ratio-down { color: #2d6a4f; font-weight: 600; }
.ratio-new { color: #e85d04; font-weight: 600; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.dot-green { background: #52b788; }
.dot-yellow { background: #ffb703; }
.dot-red { background: #e63946; }
.footer { max-width: 900px; margin: 0 auto; text-align: center; font-size: 11px; color: #bbb; padding: 20px 0; }
/* ===== 选项卡 ===== */
.tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tab-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #666; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { border-color: #e85d04; color: #e85d04; }
.tab-btn.active { background: #e85d04; border-color: #e85d04; color: #fff; }
.subtotal-row { font-weight: 600; background: #fff9f5; }
.subtotal-row td { border-top: 2px solid #e85d04; }
.table-note { font-size: 11px; color: #aaa; margin-top: 6px; }
/* 分经销商明细列宽 */
.dealer-table th:nth-child(1), .dealer-table td:nth-child(1) { width: 36px; }
.dealer-table th:nth-child(2), .dealer-table td:nth-child(2) { min-width: 180px; }
.dealer-table th:nth-child(3), .dealer-table td:nth-child(3),
.dealer-table th:nth-child(4), .dealer-table td:nth-child(4),
.dealer-table th:nth-child(5), .dealer-table td:nth-child(5) { width: 60px; text-align: right; }
.dealer-table th:nth-child(6), .dealer-table td:nth-child(6) { width: 110px; text-align: center; }
.dealer-table th:nth-child(7), .dealer-table td:nth-child(7) { width: 90px; text-align: right; }
.dealer-table th:nth-child(7), .dealer-table td:nth-child(7) { width: 70px; text-align: center; }
.dealer-table th:nth-child(8), .dealer-table td:nth-child(8) { width: 70px; }

@media (max-width: 768px) {
  body { padding: 8px; }
  .header { margin-bottom: 10px; }
  .header h1 { font-size: 16px; }
  .header .sub { font-size: 11px; }
  .overview-section { margin-bottom: 8px; padding: 10px; }
  .overview-table { font-size: 11px; }
  .overview-table th, .overview-table td { padding: 4px 5px; }
  .overview-card .oc-sub-row span:first-child { font-size: 9px; }
  .overview-card .oc-sub-row span:last-child { font-size: 10px; }
  .dealer-analysis { padding: 10px 14px; flex-direction: column; align-items: flex-start; }
  .dealer-analysis .da-items { gap: 14px; }
  .dealer-analysis .da-item .da-val { font-size: 13px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .charts-row, .tables-row { grid-template-columns: 1fr; gap: 10px; }
  .tables-row { padding-left: 0; }
  .table-box { padding: 10px; }
  .table-box h3 { font-size: 13px; }
  table { font-size: 11px; }
  thead th, tbody td { padding: 5px 3px; }
  .tab-btn { padding: 3px 8px; font-size: 11px; }
  .table-note { font-size: 10px; }
  .dealer-table th:nth-child(2), .dealer-table td:nth-child(2) { min-width: 100px; }
  .dealer-table th:nth-child(3), .dealer-table td:nth-child(3),
  .dealer-table th:nth-child(4), .dealer-table td:nth-child(4),
  .dealer-table th:nth-child(5), .dealer-table td:nth-child(5) { width: 45px; }
  .dealer-table th:nth-child(6), .dealer-table td:nth-child(6) { width: 55px; }
  .dealer-table th:nth-child(7), .dealer-table td:nth-child(7) { width: 50px; }
  .dealer-table th:nth-child(8), .dealer-table td:nth-child(8) { width: 50px; }
  .subtotal-row td { font-size: 11px; }
  .footer { font-size: 10px; padding: 12px 0; }
  .section-title { font-size: 14px; padding: 10px 0 4px; padding-left: 0; }
  .sub-title { font-size: 12px; padding: 6px 0 2px; padding-left: 0; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>袋鼠先生 · <span>线下渠道综合看板</span></h1>
    <div class="sub">数据范围：2026年4月 ~ 6月 · 线下全渠道</div>
  </div>
  <div class="sub" id="updateTime">加载中...</div>
</div>

<div class="main-tabs">
  <button class="main-tab-btn active" onclick="switchMainTab('mgmt')">管理层</button>
  <button class="main-tab-btn" onclick="switchMainTab('biz')">业务层</button>
</div>

<div class="section-title">线下总览</div>
<div class="mgmt-content" id="overviewMgmt"></div>
<div class="biz-content" id="overviewBiz" style="display:none"></div>

<div class="section-title">经销商模块情况</div>

<div class="sub-title">2.1 分省区经营情况 <span class="count" id="provinceCount"></span></div>
<div class="tables-row" id="provinceSection">
  <div class="table-box" style="grid-column: 1 / -1;">
    <div class="table-wrap"><table><thead><tr>
      <th>#</th><th>省区经理</th><th class="num">客户数</th><th class="num">活跃家数</th><th class="num">活跃率</th><th class="num">今日订单金额</th><th class="num">本月累计金额</th><th class="num">环比</th><th class="num">年度累计金额</th><th class="num">客月均订单</th>
    </tr></thead><tbody id="provinceTable"></tbody></table></div>
    <div class="table-note">金额单位：万元 · 活跃家数：30天内有订单 · 客月均订单=本年÷月数÷客户数 · 环比=本月同日累计 vs 上月同日累计</div>
  </div>
</div>

<div class="sub-title">2.2 分经销商情况 <span class="count" id="dealerCount"></span></div>
<div class="tables-row">
  <div class="table-box" style="grid-column: 1 / -1;">
    <div class="tab-bar" id="dealerTabs"></div>
    <div class="table-wrap"><table class="dealer-table"><thead>
      <tr id="dealerHeader"></tr>
    </thead><tbody id="dealerTable"></tbody></table></div>
    <div class="table-note" id="dealerNote"></div>
  </div>
</div>

<div class="sub-title">2.3 分产品情况 <span class="count" id="productCount"></span></div>
<div class="tables-row">
  <div class="table-box" style="grid-column: 1 / -1;">
    <div class="tab-bar" id="productTabs"></div>
    <div class="table-wrap"><table><thead>
      <tr id="productHeader"></tr>
    </thead><tbody id="productTable"></tbody></table></div>
    <div class="table-note" id="productNote"></div>
  </div>
</div>

<div class="footer">袋鼠先生线下渠道 · 每日自动更新 · v20260701</div>

<script>
function fmt(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toLocaleString();
}
function fmtW(n) {
  if (n === 0 || n === null || n === undefined) return '0';
  return (n / 10000).toFixed(2);
}
function fmtRatio(monthSales, prevMonthSales) {
  if (!prevMonthSales || prevMonthSales === 0) return { text: '新增', cls: 'ratio-new' };
  const ratio = ((monthSales - prevMonthSales) / prevMonthSales * 100);
  const sign = ratio >= 0 ? '+' : '';
  let cls = ratio >= 10 ? 'ratio-up' : (ratio >= 0 ? 'ratio-flat' : 'ratio-down');
  return { text: `${sign}${ratio.toFixed(1)}%`, cls: cls };
}
function rankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-other';
}
function profitLabel(rate) {
  if (rate >= 40) return '高';
  if (rate >= 30) return '好';
  if (rate >= 20) return '正常';
  if (rate >= 10) return '低';
  return '很低';
}
function profitColor(rate) {
  if (rate >= 40) return '#e85d04';
  if (rate >= 30) return '#2d6a4f';
  if (rate >= 20) return '#333';
  if (rate >= 10) return '#f48c06';
  return '#d00000';
}
function profitHtml(rate, isMgmt) {
  const c = profitColor(rate);
  if (isMgmt) {
    return `<span style="color:${c};font-weight:700;">${rate.toFixed(1)}%</span>`;
  } else {
    const l = profitLabel(rate);
    const w = rate >= 30 ? 700 : 600;
    return `<span style="color:${c};font-weight:${w};">${l}</span>`;
  }
}

let currentMainTab = 'mgmt';
let d = null;
let currentDealerTab = '全部';
let currentProductTab = '全部';

function switchMainTab(tab) {
  currentMainTab = tab;
  document.querySelectorAll('.main-tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === (tab === 'mgmt' ? '管理层' : '业务层'));
  });
  // 总览切换
  document.getElementById('overviewMgmt').style.display = tab === 'mgmt' ? '' : 'none';
  document.getElementById('overviewBiz').style.display = tab === 'biz' ? '' : 'none';
  // 重新渲染经销商/产品表
  renderDealerHeader();
  renderDealerTable();
  renderProductHeader();
  renderProductTable();
}

// ===== 经销商表头 =====
function renderDealerHeader() {
  const isMgmt = currentMainTab === 'mgmt';
  document.getElementById('dealerHeader').innerHTML =
    `<th>#</th><th>经销商</th><th class="num">今日订单金额</th><th class="num">本月累计金额</th><th class="num">年度累计金额</th>` +
    (isMgmt ? `<th class="num">年毛利率</th>` : `<th class="num">毛利率</th>`) +
    `<th class="num">30天内活跃次数</th><th>首批月</th><th>省区经理</th>`;
  document.getElementById('dealerNote').textContent = isMgmt
    ? '金额单位：万元 · 毛利率：≥40% 高 | 30%-40% 好 | 20%-30% 正常 | 10%-20% 低 | <10% 很低'
    : '金额单位：万元 · 标签：≥40% 高 | 30%-40% 好 | 20%-30% 正常 | 10%-20% 低 | <10% 很低';
}

// ===== 产品表头 =====
function renderProductHeader() {
  const isMgmt = currentMainTab === 'mgmt';
  document.getElementById('productHeader').innerHTML =
    `<th>#</th><th>产品</th><th class="num">本月累计金额</th><th class="num">年度累计金额</th><th class="num">30天内下单次数</th>` +
    (isMgmt ? `<th class="num">年毛利情况</th>` : `<th class="num">毛利率</th>`);
  document.getElementById('productNote').textContent = isMgmt
    ? '金额单位：万元 · 毛利情况：≥40% 高 | 30%-40% 好 | 20%-30% 正常 | 10%-20% 低 | <10% 很低'
    : '金额单位：万元 · 标签：≥40% 高 | 30%-40% 好 | 20%-30% 正常 | 10%-20% 低 | <10% 很低';
}

fetch('dashboard_data.json?v=6').then(r => r.json()).then(data => {
  d = data;
  document.getElementById('updateTime').textContent = '更新于 ' + d.update_time;

  const cats = [
    { label: '线下累计', key: 'overview_all', id: 1 },
    { label: '零食渠道', key: 'overview_snack', id: 2 },
    { label: '闪电仓', key: 'overview_lightning', id: 3 },
    { label: '经销商', key: 'overview_dealer', id: 4 },
  ];

  // ===== 管理层总览（两个表格） =====
  function renderOverviewTable(period, cats, getSales, getProfit, getRate, getSalesMom, getRateMom) {
    const rows = cats.map((c, i) =>
      `<tr>` +
      `<td><span class="overview-dot od-${i+1}"></span>${c.label}</td>` +
      `<td class="num">${fmtW(getSales(c))}</td>` +
      `<td class="num">${fmtW(getProfit(c))}</td>` +
      `<td class="num">${getRate(c)}%</td>` +
      (getSalesMom ? `<td class="num ${salesMomCls(getSalesMom(c))}">${salesMomText(getSalesMom(c))}</td>` : '') +
      (getRateMom ? `<td class="num ${rateMomCls(getRateMom(c))}">${rateMomText(getRateMom(c))}</td>` : '') +
      `</tr>`
    ).join('');
    const momHeaders = getSalesMom ? '<th class="num">销售环比</th><th class="num">毛利率环比</th>' : '';
    return `<div class="overview-section">` +
      `<div class="section-label">${period}</div>` +
      `<table class="overview-table"><thead><tr><th>类别</th><th class="num">销售</th><th class="num">毛利</th><th class="num">毛利率</th>${momHeaders}</tr></thead>` +
      `<tbody>${rows}</tbody></table>` +
      `</div>`;
  }
  function salesMomText(v) { if (v === null || v === undefined) return '新增'; const s = v >= 0 ? '+' : ''; return `${s}${v.toFixed(1)}%`; }
  function salesMomCls(v) { if (v === null || v === undefined) return 'ratio-new'; if (v >= 10) return 'ratio-up'; if (v >= 0) return 'ratio-flat'; return 'ratio-down'; }
  function rateMomText(v) { if (v === null || v === undefined) return '-'; const s = v >= 0 ? '+' : ''; return `${s}${v.toFixed(1)}%`; }
  function rateMomCls(v) { if (v === null || v === undefined) return 'ratio-flat'; if (v > 2) return 'ratio-up'; if (v < -2) return 'ratio-down'; return 'ratio-flat'; }
  document.getElementById('overviewMgmt').innerHTML =
    renderOverviewTable('本年累计', cats,
      c => d[c.key].year_sales, c => d[c.key].year_profit, c => d[c.key].year_rate, null, null) +
    renderOverviewTable('本月累计', cats,
      c => d[c.key].month_sales, c => d[c.key].month_profit, c => d[c.key].month_rate,
      c => d[c.key].sales_mom, c => d[c.key].rate_mom);

  // ===== 业务层总览（一个表格：类别|今日订单金额|本月累计金额|年度累计金额） =====
  const bizRows = cats.map((c, i) =>
    `<tr>` +
    `<td><span class="overview-dot od-${i+1}"></span>${c.label}</td>` +
    `<td class="num">${fmtW(d[c.key].today_sales)}</td>` +
    `<td class="num">${fmtW(d[c.key].month_sales)}</td>` +
    `<td class="num">${fmtW(d[c.key].year_sales)}</td>` +
    `</tr>`
  ).join('');
  document.getElementById('overviewBiz').innerHTML =
    `<div class="overview-section">` +
    `<table class="overview-table"><thead><tr><th>类别</th><th class="num">今日订单金额</th><th class="num">本月累计金额</th><th class="num">年度累计金额</th></tr></thead>` +
    `<tbody>${bizRows}</tbody></table>` +
    `</div>`;

  document.getElementById('dealerCount').textContent = `· 共 ${d.total_dealers} 家`;
  document.getElementById('provinceCount').textContent = `· 共 ${d.managers.length} 人`;
  document.getElementById('productCount').textContent = `· 共 ${d.products.length} 个`;

  // ===== 分经销商 =====
  const managerNames = d.managers.map(m => m.name);

  function renderDealerTabs() {
    const tabs = ['全部', ...managerNames];
    document.getElementById('dealerTabs').innerHTML = tabs.map(t => {
      if (t === '全部') return `<button class="tab-btn${t === currentDealerTab ? ' active' : ''}" onclick="switchDealerTab('${t}')">${t}</button>`;
      const mgr = d.managers.find(m => m.name === t);
      const count = mgr ? mgr.clients : 0;
      return `<button class="tab-btn${t === currentDealerTab ? ' active' : ''}" onclick="switchDealerTab('${t}')">${t}(${count})</button>`;
    }).join('');
  }

  function renderDealerTable() {
    const isMgmt = currentMainTab === 'mgmt';
    let filtered;
    if (currentDealerTab === '全部') {
      filtered = d.dealers;
    } else {
      filtered = d.dealers.filter(v => v.manager === currentDealerTab);
    }
    const rows = filtered.map((v, i) => {
      const pr = v.profit_rate;
      return `<tr>
        <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
        <td>${v.name}</td>
        <td class="num">${fmtW(v.today_sales)}</td>
        <td class="num">${fmtW(v.month_sales)}</td>
        <td class="num">${fmtW(v.sales)}</td>
        <td class="num">${profitHtml(pr, isMgmt)}</td>
        <td class="num">${v.active_days || 0} 天</td>
        <td>${v.first_month || '-'}</td>
        <td>${v.manager || '-'}</td>
      </tr>`;
    });
    if (filtered.length > 0) {
      const st = filtered.reduce((s, v) => s + v.today_sales, 0);
      const sm = filtered.reduce((s, v) => s + v.month_sales, 0);
      const sy = filtered.reduce((s, v) => s + v.sales, 0);
      const sp = filtered.reduce((s, v) => s + v.profit, 0);
      const sr = sy > 0 ? parseFloat((sp / sy * 100).toFixed(1)) : 0;
      rows.push(`<tr class="subtotal-row">
        <td></td><td>${currentDealerTab} 小计（${filtered.length}家）</td>
        <td class="num">${fmtW(st)}</td>
        <td class="num">${fmtW(sm)}</td>
        <td class="num">${fmtW(sy)}</td>
        <td class="num">${profitHtml(sr, isMgmt)}</td>
        <td></td><td></td><td></td>
      </tr>`);
    }
    document.getElementById('dealerTable').innerHTML = rows.join('');
  }

  window.switchDealerTab = function(tab) {
    currentDealerTab = tab;
    renderDealerTabs();
    renderDealerTable();
  };

  renderDealerHeader();
  renderDealerTabs();
  renderDealerTable();

  // ===== 分省区（两边相同） =====
  const manRows = d.managers.map((v, i) => {
    const ratio = fmtRatio(v.month_sales, v.prev_month_sales);
    const activeRate = v.clients > 0 ? (v.active_clients / v.clients * 100).toFixed(0) + '%' : '-';
    const avgMonthly = (v.clients > 0 && v.data_months > 0) ? fmtW(v.sales / v.data_months / v.clients) : '-';
    return `<tr>
      <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
      <td><strong>${v.name}</strong></td>
      <td class="num">${v.clients}</td>
      <td class="num">${v.active_clients}</td>
      <td class="num">${activeRate}</td>
      <td class="num">${fmtW(v.today_sales)}</td>
      <td class="num">${fmtW(v.month_sales)}</td>
      <td class="num ${ratio.cls}">${ratio.text}</td>
      <td class="num">${fmtW(v.sales)}</td>
      <td class="num">${avgMonthly}</td>
    </tr>`;
  }).join('');
  const totalToday = d.managers.reduce((s, v) => s + v.today_sales, 0);
  const totalMonth = d.managers.reduce((s, v) => s + v.month_sales, 0);
  const totalPrevMonth = d.managers.reduce((s, v) => s + v.prev_month_sales, 0);
  const totalYear = d.managers.reduce((s, v) => s + v.sales, 0);
  const totalClients = d.managers.reduce((s, v) => s + v.clients, 0);
  const totalActive = d.managers.reduce((s, v) => s + v.active_clients, 0);
  const totalActiveRate = totalClients > 0 ? (totalActive / totalClients * 100).toFixed(0) + '%' : '-';
  const totalRatio = fmtRatio(totalMonth, totalPrevMonth);
  const dataMonths = d.managers.length > 0 ? d.managers[0].data_months : 1;
  const totalAvg = (totalClients > 0 && dataMonths > 0) ? fmtW(totalYear / dataMonths / totalClients) : '-';
  document.getElementById('provinceTable').innerHTML = manRows + `<tr style="font-weight:700;background:#f8f9fb;">
    <td></td><td>合计</td>
    <td class="num">${totalClients}</td>
    <td class="num">${totalActive}</td>
    <td class="num">${totalActiveRate}</td>
    <td class="num">${fmtW(totalToday)}</td>
    <td class="num">${fmtW(totalMonth)}</td>
    <td class="num ${totalRatio.cls}">${totalRatio.text}</td>
    <td class="num">${fmtW(totalYear)}</td>
    <td class="num">${totalAvg}</td>
  </tr>`;

  // ===== 分产品 =====
  function renderProductTabs() {
    const tabs = ['全部', ...managerNames];
    document.getElementById('productTabs').innerHTML = tabs.map(t => {
      if (t === '全部') return `<button class="tab-btn${t === currentProductTab ? ' active' : ''}" onclick="switchProductTab('${t}')">${t}</button>`;
      const count = d.products.filter(v => v.manager === t).length;
      return `<button class="tab-btn${t === currentProductTab ? ' active' : ''}" onclick="switchProductTab('${t}')">${t}(${count})</button>`;
    }).join('');
  }

  function renderProductTable() {
    const isMgmt = currentMainTab === 'mgmt';
    let filtered;
    if (currentProductTab === '全部') {
      filtered = d.products;
    } else {
      filtered = d.products.filter(v => v.manager === currentProductTab);
    }
    const rows = filtered.map((v, i) => {
      const pr = v.profit_rate;
      return `<tr>
        <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
        <td>${v.name}</td>
        <td class="num">${fmtW(v.month_sales)}</td>
        <td class="num">${fmtW(v.sales)}</td>
        <td class="num">${v.active_days_30 || 0} 次</td>
        <td class="num">${profitHtml(pr, isMgmt)}</td>
      </tr>`;
    });
    document.getElementById('productTable').innerHTML = rows.join('');
  }

  window.switchProductTab = function(tab) {
    currentProductTab = tab;
    renderProductTabs();
    renderProductTable();
  };

  renderProductHeader();
  renderProductTabs();
  renderProductTable();

});
</script>
</body>
</html>
